appId: com.evan5208.laolv
productName: 老驴
executableName: laolv
copyright: Copyright © 2026 老驴
compression: maximum
artifactName: laolv-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron
  - package.json

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
      - "!icons/*.md"
      - "!icons/*.svg"
      - "!bin/**"
      - "!screenshot/**"
  # OpenClaw package (node_modules copied separately by afterPack hook
  # because electron-builder respects .gitignore which excludes node_modules/)
  - from: build/openclaw/
    to: openclaw/
  # Pre-bundled third-party skills (full directories, not only SKILL.md)
  - from: build/preinstalled-skills/
    to: resources/preinstalled-skills/
  # NOTE: OpenClaw plugin mirrors (dingtalk, etc.) are bundled by the
  # afterPack hook (after-pack.cjs) directly from node_modules, so they
  # don't need an extraResources entry here.

afterPack: ./scripts/after-pack.cjs

asar: true
asarUnpack:
  - "**/*.node"

# Disable native module rebuilding.
# The Electron renderer/main process has no native (.node) dependencies.
# All native modules (opus, sharp, koffi …) belong to openclaw, which is
# bundled separately (bundle-openclaw.mjs → extraResources) and runs in its
# own process — @electron/rebuild must NOT touch them.
npmRebuild: false

# Auto-update configuration
# Use this fork's GitHub Releases as the sole update source.
publish:
  - provider: github
    owner: evan5208
    repo: "laolv"

# macOS Configuration
mac:
  extraResources:
    - from: resources/bin/darwin-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  notarize: true
  extendInfo:
    NSMicrophoneUsageDescription: 老驴需要麦克风权限以支持语音功能
    NSCameraUsageDescription: 老驴需要摄像头权限以支持视频功能

dmg:
  background: resources/dmg-background.png
  icon: resources/icons/icon.icns
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - type: file
      x: 130
      y: 220
    - type: link
      path: /Applications
      x: 410
      y: 220

# Windows Configuration
win:
  # Skip update signature verification: we ship via OSS + GitHub without a
  # code-signing certificate, so verifying would always fail on the updater.
  verifyUpdateCodeSignature: false
  extraResources:
    - from: resources/bin/win32-${arch}
      to: bin
    - from: resources/cli/win32/
      to: cli/
  icon: resources/icons/icon.ico
  target:
    - target: nsis
      arch: x64
    - target: nsis
      arch: arm64

nsis:
  oneClick: false
  perMachine: false
  warningsAsErrors: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  differentialPackage: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 老驴
  uninstallDisplayName: 老驴
  license: LICENSE
  include: scripts/installer.nsh
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

# Linux Configuration
linux:
  extraResources:
    - from: resources/bin/linux-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  icon: resources/icons
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  category: Utility
  maintainer: evan5208 <evan5208@users.noreply.github.com>
  vendor: 老驴
  synopsis: 基于 OpenClaw 的 AI 助手
  description: 老驴是一款基于 OpenClaw 网关的图形化 AI 助手应用，可在多个消息平台中提供智能自动化与协作能力。
  desktop:
    entry:
      Name: 老驴
      Comment: 基于 OpenClaw 的 AI 助手
      Categories: Utility;Network;
      Keywords: ai;assistant;automation;chat;
      StartupWMClass: laolv

appImage:
  license: LICENSE

deb:
  depends:
    # Use OR syntax to support both Ubuntu 22.04 and Ubuntu 24.04 (t64 transition).
    # Ubuntu 24.04 renamed many libraries with a t64 suffix (64-bit time_t ABI transition).
    - libgtk-3-0 | libgtk-3-0t64
    - libnotify4 | libnotify4t64
    - libnss3
    - libxss1 | libxss1t64
    - libxtst6 | libxtst6t64
    - xdg-utils
    - libatspi2.0-0 | libatspi2.0-0t64
    - libuuid1
  afterInstall: scripts/linux/after-install.sh
  afterRemove: scripts/linux/after-remove.sh
